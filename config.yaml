# ─────────────────────────────────────────────────────────────────────────────
#  middler — operating configuration (non-secret)
#  Secrets live in .env. This file is safe to commit. All times in UTC.
# ─────────────────────────────────────────────────────────────────────────────

region: au                    # The Odds API region: AU-licensed books only

# Sports to watch. Keys are The-Odds-API sport keys. These four are confirmed live
# in the AU region with h2h/totals/spreads across ~11 books — i.e. real middling
# markets (proposal §8). basketball_aus_nbl is omitted (not returned by the feed).
#
# Golf is intentionally NOT here: in the AU free feeds it exists only as outright
# tournament-winner markets (no totals/spreads/matchups), which the middling engine
# cannot act on. Enabling golf needs outright + Betfair-lay support — see API audit.
sports:
  # Golf majors — outright back-lay (back a player at an AU bookie, lay on Betfair).
  # The Odds API returns both bookie back prices and Betfair lay prices in one call.
  # US Open is live now; the others activate as each tournament approaches.
  - golf_us_open_winner
  - golf_the_open_championship_winner
  # Team-sport middling — the durable, multi-book hunting ground (in season now).
  - aussierules_afl
  - rugbyleague_nrl
  # NBA finals / NFL are out of season here — add back when they return:
  # - basketball_nba
  # - americanfootball_nfl

# Markets where middling/arbitrage live.
markets:
  - h2h          # head-to-head — arbitrage only
  - totals       # over/under — the middling backbone
  - spreads      # handicaps — the middling backbone

# Sharp references for the sanity filter (§4.4). An "edge" that disagrees with
# these is treated as one book being wrong, not a genuine opportunity. Pinnacle is
# dropped — it is not AU-licensed and never appears in the au region; Betfair's
# exchange is the AU sharp reference.
sharp_books:
  - betfair_ex_au

# Bookmakers to include (empty = all AU books the feed returns). Listed for
# documentation; deep-link templates live in middler/alert/deeplinks.py.
bookmakers: []

# Secondary feed (odds-api.io) enrichment: maps each The-Odds-API sport key to the
# odds-api.io slug for the same sport (slugs confirmed against its /sports endpoint).
# Note the free odds-api.io tier returns only 2 bookmakers, so it's a thin top-up to
# The Odds API's ~11 AU books. rugbyleague_nrl is omitted (odds-api.io lists only a
# generic "rugby" slug — confirm it's league before enabling).
odds_api_io_sport_map:
  aussierules_afl: aussie-rules
  basketball_nba: basketball
  americanfootball_nfl: american-football

# Exact odds-api.io bookmaker names to request (from GET /v3/bookmakers). The free
# tier allows only two selected books; a paid plan unlocks the AU books
# (Sportsbet.com.au, TABtouch AU, PointsBet AU, Ladbrokes, Unibet AU, ...).
odds_api_io_bookmakers:
  - Bet365
  - Betfair Exchange

# Tertiary feed (OddsPapi) — deep cross-book h2h. Maps each The-Odds-API sport key
# to OddsPapi's numeric sportId (confirmed: aussie-rules=31, rugby=26, golf=67).
# Its strength is breadth (300+ books → head-to-head arbs the two-book feeds miss),
# but the quota is tiny (~250/month), so only the in-season team sports are mapped
# here. Golf is omitted: its OddsPapi market is matchups, not the score-totals play,
# and its outright back-lay already runs off The Odds API.
oddspapi_sport_map:
  aussierules_afl: 31
  rugbyleague_nrl: 26

# Per-sport market override. Golf only supports outright (winner) markets — the
# feed returns bookie back prices plus Betfair lay prices, enabling back-lay.
# Unlisted sports use the default `markets` above.
markets_by_sport:
  golf_us_open_winner: [outrights]
  golf_the_open_championship_winner: [outrights]
  golf_masters_tournament_winner: [outrights]
  golf_pga_championship_winner: [outrights]

# ── Detection thresholds ─────────────────────────────────────────────────────
detection:
  # Minimum arbitrage profit margin (fraction). 0.005 = 0.5%.
  min_arb_margin: 0.005
  # Minimum middle width in points to bother flagging.
  min_middle_width: 0.5
  # Minimum estimated EV (fraction of total stake) to flag a middle.
  min_middle_ev: 0.0
  # Stake-sizing mode: equal | balanced | kelly
  stake_mode: balanced
  # Fraction of Kelly when stake_mode = kelly (0..1). Ignored otherwise.
  kelly_fraction: 0.25
  # Max deviation (in implied-prob points) from the sharp reference before a
  # line is treated as stale/wrong and dropped.
  sharp_tolerance: 0.06
  # Back-and-lay (exchange) strategy: Betfair commission on net winnings, and the
  # minimum locked-in ROI to flag a back-lay. Active once Betfair lay prices feed in.
  betfair_commission: 0.05
  min_back_lay_roi: 0.0

# ── Scheduler / adaptive cadence ─────────────────────────────────────────────
scheduler:
  # Events enter the ACTIVE polling set this many hours before commence_time.
  # Widened to 15 days so golf outright futures (open weeks ahead) are polled;
  # the budget guard caps total calls regardless of how many events are active.
  active_window_hours: 360
  # Discovery (free /events listing) cadence in seconds.
  discovery_interval_sec: 3600
  # Odds-poll cadence floor/ceiling in seconds. Cadence ramps between these as
  # an event nears kick-off. Widened for the free trial so far-out events poll
  # rarely and the limited daily credit budget is spent near kick-offs (the hard
  # cap is enforced by the budget section below, not by cadence).
  poll_min_sec: 300
  poll_max_sec: 21600
  # Stop polling this many seconds before commence_time (never poll in-play).
  stop_before_commence_sec: 0

# ── Free-tier budget guards ──────────────────────────────────────────────────
# The Odds API: 500 credits/month, 3 credits per team-sport call (h2h+totals+
# spreads). 5 calls/day × 3 = ~450/month, leaving a reserve. The live balance is
# also read from the API's response header and polling stops below the reserve.
budget:
  # The Odds API is spent adaptively: each day targets (remaining - reserve) /
  # days-left-in-month credits, so it uses the full 500/month smoothly (golf calls
  # cost 1 credit, team-sport calls 3) and stops above the reserve.
  the_odds_api_monthly_credits: 500
  the_odds_api_min_reserve: 50
  odds_api_io_per_hour: 90      # free tier allows 100/hour (polled independently)
  oddspapi_per_day: 8           # free tier ~250/month (client not yet wired)

# ── Stake calculator defaults (for the Telegram alert) ───────────────────────
staking:
  default_total_stake: 100.0      # AUD, used to render the suggested split
  two_step_confirm_above: 200.0   # AUD, require a second confirm above this
  bankroll: 1000.0                # AUD, only used when detection.stake_mode = kelly

# ── Backcast / report ────────────────────────────────────────────────────────
backcast:
  # Per-market historical hit-rate priors for "result lands in the middle".
  # Used only to estimate EV before enough self-recorded data exists; replaced
  # by empirically observed rates once the history store has settled results.
  middle_hit_rate_prior:
    totals: 0.06
    spreads: 0.05
  report_path: reports/backcast.html
  # The live app rewrites the HTML report this often (seconds), so the copy on
  # the NAS share is always current. 0 disables.
  report_interval_sec: 3600
